components:
  securitySchemes:
    Payments_API_BasicAuth:
      type: http
      scheme: basic
    Payment_Session_BasicAuth:
      type: http
      scheme: basic
  parameters:
    Payments_API_APIVersionHeaderExternal:
      in: header
      name: api-version
      schema:
        example: '2024-11-11'
        type: string
        enum:
          - '2024-11-11'
    Payments_API_ForUserIdHeaderParam:
      in: header
      name: for-user-id
      required: false
      schema:
        type: string
      description: The XenPlatform subaccount user id that will perform this transaction.
    Payments_API_WithSplitRuleHeaderParam:
      in: header
      name: with-split-rule
      required: false
      schema:
        type: string
      description: The XenPlatform split rule id that will be applied to this transaction.
    Payments_API_XCallbackToken:
      in: header
      name: x-callback-token
      required: false
      schema:
        type: string
      description: >-
        Your Xendit unique webhook token to verify the origin of the webhook. It
        is highly recommended for your integration to verify this value.
    Payments_API_PaymentRequestIdPathParam:
      in: path
      name: payment_request_id
      required: true
      schema:
        type: string
        minLength: 39
        maxLength: 39
      example: pr-8877c08a-740d-4153-9816-3d744ed197a5
    Payments_API_PaymentIdPathParam:
      in: path
      name: payment_id
      required: true
      schema:
        type: string
        minLength: 39
        maxLength: 39
      example: py-cc3938dc-c2a5-43c4-89d7-7570793348c2
    Payments_API_PaymentTokenIdPathParam:
      in: path
      name: payment_token_id
      required: true
      schema:
        type: string
        minLength: 39
        maxLength: 39
      example: pt-56ef1da0-6c92-490a-9ea8-803eaf404ce1
    Payment_Session_ForUserIdHeaderParam:
      in: header
      name: for-user-id
      required: false
      schema:
        type: string
      description: The XenPlatform subaccount user id that will perform this transaction.
    Payment_Session_SplitRuleHeaderParam:
      in: header
      name: with-split-rule
      required: false
      schema:
        type: string
      description: The XenPlatform split rule id that will be applied to this transaction.
    Payment_Session_SessionIdPathParam:
      in: path
      name: session_id
      required: true
      schema:
        type: string
        minLength: 27
        maxLength: 27
      example: ps-661f87c614802d6c402cd82d
  schemas:
    Payments_API_PaymentRequestReferenceId:
      type: string
      minLength: 1
      maxLength: 255
      description: >-
        A reference ID from merchants to identify their request. For "CARDS"
        channel code, reference ID must be unique.
    Payments_API_Country:
      type: string
      enum:
        - ID
        - PH
        - VN
        - TH
        - SG
        - MY
        - HK
        - MX
      description: >-
        ISO 3166-1 alpha-2 two-letter country code for the country of
        transaction.
      example: ID
    Payments_API_Currency:
      type: string
      enum:
        - IDR
        - PHP
        - VND
        - THB
        - SGD
        - MYR
        - USD
        - HKD
        - AUD
        - GBP
        - EUR
        - JPY
        - MXN
      description: ISO 4217 three-letter currency code for the payment.
      example: IDR
    Payments_API_ChannelCode:
      type: string
      description: >
        Channel code used to select the payment method provider.


        <iframe
        src="https://doc-widget.xendit.co/channel-data-finder/?iframe_id=channel-code-iframe"
        frameborder="0" allowfullscreen="" allow="accelerometer; autoplay;
        clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        title="" style="border:1px solid
        #ccc;width:100%;display:flex;margin-right:auto;max-height:800px;"
        width="100%" loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"></iframe>
    Payments_API_ChannelPropertiesWidgetPay:
      type: object
      description: >
        Data required to initiate transaction with payment method provider.
        Refer to the Channel Data Finder widget in the channel_code field above
        for the full list of required properties for each channel.
    Payments_API_RequestAmount:
      type: number
      minimum: 0
      description: |
        The intended payment amount to be collected from the end user.
      example: 10000
    Payments_API_CaptureMethod:
      type: string
      enum:
        - AUTOMATIC
        - MANUAL
      default: AUTOMATIC
      description: >
        AUTOMATIC: payment capture will be processed immediately after payment
        request is created.

        MANUAL: payment capture requires merchant's trigger via payment capture
        endpoint before being processed
      example: AUTOMATIC
    Payments_API_Description:
      type: string
      minLength: 1
      maxLength: 1000
      description: A custom description for the Payment Request.
      example: 'Payment for your order #123'
    Payments_API_CustomerId:
      type: string
      maxLength: 41
      description: Xendit unique Capture ID generated as reference for the end user
      example: cust-b98d6f63-d240-44ec-9bd5-aa42954c4f48
    Payments_API_XenditStandardIndividualDetail:
      type: object
      required:
        - given_names
      properties:
        given_names:
          type: string
          description: >-
            Primary or first name/s of customer. Alphanumeric. No special
            characters is allowed.
          minLength: 1
          maxLength: 50
        surname:
          type: string
          description: >-
            Last or family name of customer. Alphanumeric. No special characters
            is allowed.
          minLength: 1
          maxLength: 50
        nationality:
          type: string
          description: >-
            Country code for customer nationality. ISO 3166-1 alpha-2 Country
            Code
          minLength: 2
          maxLength: 2
        place_of_birth:
          type: string
          description: >-
            City or other relevant location for the customer birth place.
            Alphanumeric. No special characters is allowed.
          minLength: 1
          maxLength: 60
        date_of_birth:
          type: string
          description: 'Date of birth of the customer. Format: YYYY-MM-DD'
          minLength: 10
          maxLength: 10
        gender:
          enum:
            - MALE
            - FEMALE
            - OTHER
          description: Gender of customer
    Payments_API_XenditStandardCustomer:
      type: object
      required:
        - type
        - reference_id
        - individual_detail
      properties:
        type:
          type: string
          enum:
            - INDIVIDUAL
          description: Type of customer
        reference_id:
          type: string
          description: >-
            Merchant provided identifier for the customer. Must be unique.
            Alphanumeric no special characters allowed
          minLength: 1
          maxLength: 255
        email:
          type: string
          description: E-mail address of customer. Maximum length 50 characters
          format: email
          minLength: 4
          maxLength: 50
        mobile_number:
          type: string
          description: >-
            Mobile number of customer in E.164 format +(country code)(subscriber
            number)
          minLength: 1
          maxLength: 50
        individual_detail:
          $ref: '#/components/schemas/Payments_API_XenditStandardIndividualDetail'
    Payments_API_MerchantMetadata:
      type: object
      description: >
        Key-value entries for your custom data.

        You can specify up to 50 keys, with key names up to 40 characters and
        values up to 500 characters.

        This is for your convenience. Xendit will not use this data for any
        processing.
      example:
        my_custom_id: merchant-123
        my_custom_order_id: order-123
    Payments_API_XenditStandardItem:
      type: object
      required:
        - reference_id
        - type
        - name
        - net_unit_amount
        - quantity
        - category
      properties:
        reference_id:
          type: string
          description: Merchant provided identifier for the item
          minLength: 1
          maxLength: 255
        type:
          enum:
            - DIGITAL_PRODUCT
            - PHYSICAL_PRODUCT
            - DIGITAL_SERVICE
            - PHYSICAL_SERVICE
            - FEE
          description: Type of item
        name:
          type: string
          description: Name of item
          minLength: 1
          maxLength: 255
        net_unit_amount:
          type: number
          description: Net amount to be charged per unit
        quantity:
          type: integer
          description: Number of units of this item in the basket
          minimum: 1
        url:
          type: string
          description: URL of the item. Must be HTTPS or HTTP
        image_url:
          type: string
          description: URL of the image of the item. Must be HTTPS or HTTP
        category:
          type: string
          description: Category for item
          maxLength: 255
        subcategory:
          type: string
          description: Sub-category for item
          maxLength: 255
        description:
          type: string
          description: Description of item
          maxLength: 255
        metadata:
          $ref: '#/components/schemas/Payments_API_MerchantMetadata'
    Payments_API_XenditStandardItemBasket:
      type: array
      description: |
        Array of objects describing the item/s attached to the payment.
      items:
        $ref: '#/components/schemas/Payments_API_XenditStandardItem'
    Payments_API_XenditStandardShippingInformation:
      type: object
      required:
        - country
      properties:
        country:
          enum:
            - ID
            - PH
            - VN
            - TH
            - SG
            - MY
            - MX
          description: 2-letter ISO 3166-2 country code for the customer’s shipping country
        street_line1:
          type: string
          description: Building name and apartment unit number
          minLength: 1
          maxLength: 255
        street_line2:
          type: string
          description: Building street address
          minLength: 1
          maxLength: 255
        city:
          type: string
          description: City, village or town as appropriate
          minLength: 1
          maxLength: 255
        province_state:
          type: string
          description: ' Either one of (whichever is applicable): Geographic area, province, or region / Formal state designation within country'
          minLength: 1
          maxLength: 255
        postal_code:
          type: string
          description: ' Postal, zip or rural delivery code, if applicable'
          minLength: 1
          maxLength: 255
    Payments_API_Pay:
      type: object
      description: >-
        Create payment request API request body for a payment request that is
        able to receive one payment.
      required:
        - reference_id
        - type
        - country
        - currency
        - request_amount
        - channel_code
        - channel_properties
      properties:
        reference_id:
          $ref: '#/components/schemas/Payments_API_PaymentRequestReferenceId'
        type:
          type: string
          enum:
            - PAY
          description: |
            PAY: Create a payment request that is able to receive one payment.
        country:
          $ref: '#/components/schemas/Payments_API_Country'
        currency:
          $ref: '#/components/schemas/Payments_API_Currency'
        channel_code:
          $ref: '#/components/schemas/Payments_API_ChannelCode'
        channel_properties:
          $ref: '#/components/schemas/Payments_API_ChannelPropertiesWidgetPay'
        request_amount:
          $ref: '#/components/schemas/Payments_API_RequestAmount'
        capture_method:
          $ref: '#/components/schemas/Payments_API_CaptureMethod'
        description:
          $ref: '#/components/schemas/Payments_API_Description'
        customer_id:
          $ref: '#/components/schemas/Payments_API_CustomerId'
        customer:
          $ref: '#/components/schemas/Payments_API_XenditStandardCustomer'
        items:
          $ref: '#/components/schemas/Payments_API_XenditStandardItemBasket'
        shipping_information:
          $ref: '#/components/schemas/Payments_API_XenditStandardShippingInformation'
        metadata:
          $ref: '#/components/schemas/Payments_API_MerchantMetadata'
    Payments_API_ChannelCodePayAndSave:
      type: string
      description: >
        Channel code used to select the payment method provider.


        <iframe
        src="https://doc-widget.xendit.co/channel-data-finder/?type=pay-and-save&iframe_id=pay-and-save-iframe"
        frameborder="0" allowfullscreen="" allow="accelerometer; autoplay;
        clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        title="" style="border:1px solid
        #ccc;width:100%;display:flex;margin-right:auto;max-height:800px;"
        width="100%" loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"></iframe>
    Payments_API_ChannelPropertiesWidgetPayAndSave:
      type: object
      description: >
        Data required to initiate transaction with payment method provider.
        Refer to the Channel Data Finder widget in the channel_code field above
        for the full list of required properties for each channel.
    Payments_API_PayAndSave:
      type: object
      description: >-
        Create payment request API request body for a payment request that is
        able to receive one payment. If the payment is successful, a reusable
        payment token will be returned in the callback as saved payment
        information for subsequent payment requests.
      required:
        - reference_id
        - type
        - country
        - currency
        - request_amount
        - channel_code
        - channel_properties
      properties:
        reference_id:
          $ref: '#/components/schemas/Payments_API_PaymentRequestReferenceId'
        type:
          type: string
          enum:
            - PAY_AND_SAVE
          description: >
            PAY_AND_SAVE: Create a payment request that is able to receive one
            payment. If the payment is successful, a reusable payment token will
            be returned in the callback as saved payment information for
            subsequent payment requests.
        country:
          $ref: '#/components/schemas/Payments_API_Country'
        currency:
          $ref: '#/components/schemas/Payments_API_Currency'
        channel_code:
          $ref: '#/components/schemas/Payments_API_ChannelCodePayAndSave'
        channel_properties:
          $ref: '#/components/schemas/Payments_API_ChannelPropertiesWidgetPayAndSave'
        request_amount:
          $ref: '#/components/schemas/Payments_API_RequestAmount'
        capture_method:
          $ref: '#/components/schemas/Payments_API_CaptureMethod'
        customer_id:
          $ref: '#/components/schemas/Payments_API_CustomerId'
        customer:
          $ref: '#/components/schemas/Payments_API_XenditStandardCustomer'
        description:
          $ref: '#/components/schemas/Payments_API_Description'
        items:
          $ref: '#/components/schemas/Payments_API_XenditStandardItemBasket'
        shipping_information:
          $ref: '#/components/schemas/Payments_API_XenditStandardShippingInformation'
        metadata:
          $ref: '#/components/schemas/Payments_API_MerchantMetadata'
    Payments_API_PaymentTokenId:
      type: string
      description: >-
        Xendit unique Payment Token ID generated as reference for reusable
        payment details of the end user.
      example: pt-cc3938dc-c2a5-43c4-89d7-7570793348c2
    Payments_API_ChannelCodePayWithToken:
      type: string
      description: >
        Channel code used to select the payment method provider.


        <iframe
        src="https://doc-widget.xendit.co/channel-data-finder/?type=pay-with-token&iframe_id=pay-with-token-iframe"
        frameborder="0" allowfullscreen="" allow="accelerometer; autoplay;
        clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        title="" style="border:1px solid
        #ccc;width:100%;display:flex;margin-right:auto;max-height:800px;"
        width="100%" loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"></iframe>
    Payments_API_ChannelPropertiesWidgetPayWithToken:
      type: object
      description: >
        Data required to initiate transaction with payment method provider.
        Refer to the Channel Data Finder widget in the channel_code field above
        for the full list of required properties for each channel.
    Payments_API_PayWithToken:
      type: object
      description: >-
        Create payment request API request body for a payment request that is
        able to receive one payment. This request uses previously saved payment
        information in the form of a payment token to make the payment flow more
        frictionless for your end user.
      required:
        - reference_id
        - type
        - country
        - currency
        - request_amount
        - payment_token_id
        - channel_code
      properties:
        reference_id:
          $ref: '#/components/schemas/Payments_API_PaymentRequestReferenceId'
        type:
          type: string
          enum:
            - PAY
          description: |
            PAY: Create a payment request that is able to receive one payment.
        payment_token_id:
          $ref: '#/components/schemas/Payments_API_PaymentTokenId'
        country:
          $ref: '#/components/schemas/Payments_API_Country'
        currency:
          $ref: '#/components/schemas/Payments_API_Currency'
        channel_code:
          $ref: '#/components/schemas/Payments_API_ChannelCodePayWithToken'
        channel_properties:
          $ref: >-
            #/components/schemas/Payments_API_ChannelPropertiesWidgetPayWithToken
        request_amount:
          $ref: '#/components/schemas/Payments_API_RequestAmount'
        capture_method:
          $ref: '#/components/schemas/Payments_API_CaptureMethod'
        description:
          $ref: '#/components/schemas/Payments_API_Description'
        customer_id:
          $ref: '#/components/schemas/Payments_API_CustomerId'
        customer:
          $ref: '#/components/schemas/Payments_API_XenditStandardCustomer'
        items:
          $ref: '#/components/schemas/Payments_API_XenditStandardItemBasket'
        shipping_information:
          $ref: '#/components/schemas/Payments_API_XenditStandardShippingInformation'
        metadata:
          $ref: '#/components/schemas/Payments_API_MerchantMetadata'
    Payments_API_ChannelCodeReusablePaymentCode:
      type: string
      description: >
        Channel code used to select the payment method provider.


        <iframe
        src="https://doc-widget.xendit.co/channel-data-finder/?type=reusable-payment-code&iframe_id=reusable-payment-code-iframe"
        frameborder="0" allowfullscreen="" allow="accelerometer; autoplay;
        clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        title="" style="border:1px solid
        #ccc;width:100%;display:flex;margin-right:auto;max-height:800px;"
        width="100%" loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"></iframe>
    Payments_API_ChannelPropertiesWidgetReusablePaymentCode:
      type: object
      description: >
        Data required to initiate transaction with payment method provider.
        Refer to the Channel Data Finder widget in the channel_code field above
        for the full list of required properties for each channel.
    Payments_API_ReusablePaymentCode:
      type: object
      description: >-
        Create payment request API request body for a payment request that is
        able to receive multiple payments. This is only used for repeat use
        payment method like static QR, static OTC payment code or a predefined
        Virtual Account number.
      required:
        - reference_id
        - type
        - country
        - currency
        - channel_code
        - channel_properties
      properties:
        reference_id:
          $ref: '#/components/schemas/Payments_API_PaymentRequestReferenceId'
        type:
          type: string
          enum:
            - REUSABLE_PAYMENT_CODE
          description: >
            REUSABLE_PAYMENT_CODE: Create one payment request that is able to
            receive multiple payments. This is only used for repeat use payment
            method like static QR, static OTC payment code or a predefined
            Virtual Account number.
        country:
          $ref: '#/components/schemas/Payments_API_Country'
        currency:
          $ref: '#/components/schemas/Payments_API_Currency'
        channel_code:
          $ref: '#/components/schemas/Payments_API_ChannelCodeReusablePaymentCode'
        channel_properties:
          $ref: >-
            #/components/schemas/Payments_API_ChannelPropertiesWidgetReusablePaymentCode
        request_amount:
          $ref: '#/components/schemas/Payments_API_RequestAmount'
        capture_method:
          $ref: '#/components/schemas/Payments_API_CaptureMethod'
        description:
          $ref: '#/components/schemas/Payments_API_Description'
        metadata:
          $ref: '#/components/schemas/Payments_API_MerchantMetadata'
        items:
          $ref: '#/components/schemas/Payments_API_XenditStandardItemBasket'
        shipping_information:
          $ref: '#/components/schemas/Payments_API_XenditStandardShippingInformation'
    Payments_API_BusinessId:
      type: string
      description: Xendit-generated identifier for the business that owns the transaction
      example: 5f27a14a9bf05c73dd040bc8
    Payments_API_PaymentRequestId:
      type: string
      description: >-
        Xendit unique Payment Request ID generated as reference after creation
        of payment request.
      example: pr-1102feb0-bb79-47ae-9d1e-e69394d3949c
    Payments_API_LatestPaymentId:
      type: string
      description: Latest Payment ID linked to the payment request.
      example: py-1402feb0-bb79-47ae-9d1e-e69394d3949c
    Payments_API_PaymentRequestType:
      type: string
      enum:
        - PAY
        - PAY_AND_SAVE
        - REUSABLE_PAYMENT_CODE
      description: >
        The payment collection intent type for the payment request.


        PAY: Create a payment request that is able to receive one payment.


        PAY_AND_SAVE: Create a payment request that is able to receive one
        payment. If the payment is successful, a reusable payment token will be
        returned for subsequent payment requests.


        REUSABLE_PAYMENT_CODE: Create a payment request that is able to receive
        multiple payments. This is only used for repeat use payment method like
        a static QR, a predefined OTC payment code or a predefined Virtual
        Account number.
    Payments_API_ChannelProperties:
      type: object
      description: >
        Data required to initiate transaction with payment method provider.
        Refer to the Channel Data Finder widget in the channel_code field above
        for the full list of required properties for each channel.
    Payments_API_Actions:
      description: >-
        Actions object contains possible next steps merchants can take to
        proceed with payment collection from end user
      type: object
      properties:
        type:
          enum:
            - PRESENT_TO_CUSTOMER
            - REDIRECT_CUSTOMER
            - API_POST_REQUEST
          description: >-
            The type of action that merchant system will need to handle to
            complete payment.
        descriptor:
          enum:
            - CAPTURE_PAYMENT
            - PAYMENT_CODE
            - QR_STRING
            - VIRTUAL_ACCOUNT_NUMBER
            - WEB_URL
            - DEEPLINK_URL
            - VALIDATE_OTP
            - RESEND_OTP
          description: >-
            The type of action that merchant system will need to handle to
            complete payment.
        value:
          type: string
          description: >-
            The specific value that will be used by merchant to complete the
            action
    Payments_API_ArrayOfActions:
      type: array
      items:
        $ref: '#/components/schemas/Payments_API_Actions'
    Payments_API_PaymentRequestStatus:
      type: string
