name: CI

on:
  pull_request:
    branches: [staging, main]
  push:
    branches: [staging, main]

jobs:
  lint-typecheck-test:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npx vitest run

      - name: RLS coverage guard
        run: bash scripts/verify-rls-coverage.sh

      - name: API auth coverage guard
        run: bash scripts/verify-api-auth.sh

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Next.js build
        run: npm run build
        env:
          DEMO_MODE: "true"
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/schoolerp"
          NEXTAUTH_SECRET: "ci-build-dummy-secret"

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: schoolerp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/schoolerp"

      # db push --force-reset is safe here: the Postgres above is a
      # disposable CI service container (dropped at job end). NEVER
      # use --force-reset against staging or prod — it DROPs and
      # recreates every table. Production migrations run through
      # `prisma migrate deploy` via scripts/vercel-build.sh.
      - name: Push schema to CI database
        run: npx prisma db push --force-reset
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/schoolerp"

      - name: Seed database
        run: npx prisma db seed
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/schoolerp"

      - name: Build Next.js
        run: npm run build
        env:
          DEMO_MODE: "true"
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/schoolerp"
          NEXTAUTH_SECRET: "ci-e2e-dummy-secret"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          DEMO_MODE: "true"
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/schoolerp"
          NEXTAUTH_SECRET: "ci-e2e-dummy-secret"
          # Xendit sandbox key — `xnd_development_*` prefix. Without this
          # the admin tagihan tests (admin.spec.ts:429-706) fail with
          # INVALID_API_KEY because lib/xendit/client.ts hits the live
          # Xendit API even on test data. Repo secret, not env-scoped.
          XENDIT_SECRET_KEY: ${{ secrets.XENDIT_SECRET_KEY }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
