    Xendit_Subscriptions_API_RecurringCycle:
      type: object
      properties:
        id:
          type: string
          description: Xendit-generated recurring cycle ID.
          example: recy_4e66b458-00b7-4ddd-9859-cce153dda097
        type:
          type: string
          description: Indicates whether the cycle was charged as part of plan creation
          enum:
            - SCHEDULED
            - IMMEDIATE
        reference_id:
          type: string
          description: Inherited from Plan reference_id
        plan_id:
          type: string
          description: ID of the associated recurring plan.
          example: repl_4e66b458-00b7-4ddd-9859-cce153dda097
        customer_id:
          type: string
          description: Xendit-generated customer ID.
        cycle_number:
          type: integer
          description: The order of the current cycle within the plan
        status:
          type: string
          enum:
            - SCHEDULED
            - PENDING
            - RETRYING
            - FAILED
            - SUCCEEDED
            - CANCELLED
          description: Status of the recurring cycle.
        attempt_details:
          type: array
          description: Details of any attempt actions made on the cycle.
          items:
            type: object
            required:
              - attempt_number
              - action_number
              - type
              - created
              - payment_id
              - status
              - failure_code
              - next_retry_timestamp
            properties:
              attempt_number:
                type: integer
                description: >
                  Order of the attempt within the cycle. The current action
                  belongs to this attempt.
              action_number:
                type: integer
                description: >
                  Order of the action within an attempt. An attempt can have
                  multiple actions.

                  In general, one action corresponds to one unique payment token
                  within the same attempt.
              type:
                type: string
                description: >
                  The type of payment attempt made on the cycle.

                  INITIAL represents the first system generated attempt on the
                  cycle.

                  RETRY represents all subsequent system generated attempt after
                  first attempt failed.

                  FORCED represents explicit request made by the merchant to
                  perform a payment attempt on the cycle.

                  PAYMENT_LINK represents a payment link sent to the end user to
                  solicit payment.
                enum:
                  - INITIAL
                  - RETRY
                  - FORCED
                  - PAYMENT_LINK
              created:
                type: string
                description: The date time that the payment action was performed.
                format: date-time
              payment_id:
                type: string
                description: This field used to indicate the payment ID created from cycle
                example: py-5cd39c23-89da-45f9-b316-f1e865b71b46
                nullable: true
              payment_token_id:
                type: string
                description: The payment token ID used for this payment action.
                example: pt-f8429206-f3ea-49f0-abb4-eaa89064056e
                nullable: true
              status:
                type: string
                description: The status of the action
                enum:
                  - SUCCEEDED
                  - FAILED
                  - PENDING
              failure_code:
                type: string
                description: >-
                  If payment action encounters an error, the failure reason will
                  be shown here.
                nullable: true
              next_retry_timestamp:
                nullable: true
                type: string
                description: >-
                  The date time that the next RETRY attempt should be created
                  for this cycle.
                format: date-time
              payment_session:
                nullable: true
                type: object
                description: Contains details of payment links sent to the end user.
                properties:
                  session_id:
                    type: string
                    description: Payment session id created when the cycle attempt failed
                    example: ps-661f87c614802d6c402cd82d
                  payment_link_url:
                    type: string
                    description: >-
                      This URL will lead the end user to a checkout page to
                      complete the payment.
        attempt_count:
          type: integer
          description: number of attempts made on the cycle so far
        forced_attempt_count:
          type: integer
          description: number of forced attempts made on the cycle so far
        scheduled_timestamp:
          type: string
          format: date-time
          description: >-
            The scheduled date and time that the cycle will be executed. Always
            in UTC zero.
          example: '2020-11-20T16:23:52Z'
        currency:
          type: string
          description: ISO 4217 currency code (e.g., IDR, PHP).
          example: IDR
        amount:
          type: number
          description: Amount charged in the cycle.
          minimum: 0
        metadata:
          type: object
          nullable: true
        created:
          type: string
          format: date-time
          description: ISO 8601 date time format
          example: '2017-07-21T17:32:28Z'
        updated:
          type: string
          format: date-time
          description: ISO 8601 date time format
          example: '2017-07-21T17:32:28Z'
    Xendit_Subscriptions_API_BasketItem:
      type: object
      required:
        - reference_id
        - type
        - name
        - net_unit_amount
        - quantity
        - category
      properties:
        type:
