  /recurring/plans:
    post:
      tags:
        - Subscriptions
      summary: Create Subscription Plan
      description: Creates a new subscription plan for managing subscription payments.
      operationId: createRecurringPlan
      parameters:
        - name: api-version
          in: header
          schema:
            example: '2026-01-01'
            type: string
            enum:
              - '2026-01-01'
        - name: for-user-id
          in: header
          required: false
          schema:
            type: string
          description: >
            The sub-account user-id to make this transaction for. This header is
            only used if you have access to xenPlatform.  See xenPlatform for
            more information.
        - name: with-split-rule
          in: header
          required: false
          schema:
            type: string
          description: >
            The XenPlatform split rule ID that will be applied to this
            transaction. This header is only used if you have access to
            xenPlatform.
      requestBody:
        description: JSON object containing recurring plan details.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Xendit_Subscriptions_API_RecurringPlan'
      responses:
        '202':
          description: >-
            Successfully created a recurring plan. A webhook will follow to
            confirm plan activation.
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/Xendit_Subscriptions_API_RecurringPlanResponse
        '400':
          description: Validation errors occurred.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: string
                    description: Error code identifying the issue.
                  message:
                    type: string
                    description: Description of the error.
              examples:
                API_VALIDATION_ERROR:
                  summary: >-
                    Fields or values in the payload body does not comply with
                    our API specification.
                  value:
                    error_code: API_VALIDATION_ERROR
                    message: Check the specific error message for debugging.
                INVALID_PAYMENT_TOKEN_ID:
                  summary: >-
                    Payment token ID is not in eligible status for plan
                    creation.
                  value:
                    error_code: INVALID_PAYMENT_TOKEN_ID
                    message: >-
                      The payment_token_id provided has a mismatched currency or
                      it is not "ACTIVE" because it has expired/ been unlinked/
                      linking has not been completed. Please retry with a valid
                      payment_token_id.
        '401':
          description: Invalid API key or unauthorized access.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: string
                  message:
                    type: string
                example:
                  error_code: INVALID_API_KEY
                  message: API key format is invalid.
        '403':
          description: Request forbidden error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: string
                  message:
                    type: string
                example:
                  error_code: REQUEST_FORBIDDEN_ERROR
                  message: The request is forbidden.
        '404':
          description: Resource not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: string
                  message:
                    type: string
              examples:
                CUSTOMER_NOT_FOUND:
                  summary: Customer not found.
                  value:
                    error_code: CUSTOMER_NOT_FOUND_ERROR
                    message: >-
                      customer_id is invalid or not found. Please try again with
                      a valid customer_id.
        '409':
          description: Idempotency error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: string
                  message:
                    type: string
                example:
                  error_code: IDEMPOTENCY_ERROR
                  message: Idempotency key has been used before.
        '500':
          description: Server error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: string
                  message:
                    type: string
                example:
                  error_code: SERVER_ERROR
                  message: >-
                    An unexpected error occurred. Our team has been notified and
                    will troubleshoot the issue.
        '503':
          description: Payment server error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: string
                  message:
                    type: string
                example:
                  error_code: CHANNEL_UNAVAILABLE
                  message: >-
                    The payment channel is currently unavailable. Please try
                    again later.
      callbacks:
        recurringPlan:
          /{merchant defined callback url}:
            post:
              requestBody:
                description: Recurring plan webhook
                content:
                  application/json:
                    schema:
                      type: object
                      description: >-
                        Recurring plan webhook to indentify status transition of
                        plan
                      properties:
                        event:
                          type: string
                          enum:
                            - recurring.plan.activated
                            - recurring.plan.inactivated
                          description: >
                            Webhook event names for recurring plan status
