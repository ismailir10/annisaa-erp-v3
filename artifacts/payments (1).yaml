      type: string
      enum:
        - AUTHORIZED
        - CANCELED
        - SUCCEEDED
        - FAILED
        - EXPIRED
        - PENDING
      description: Status of the payment.
      example: SUCCEEDED
    Payments_API_AuthorizationData:
      type: object
      description: >
        Specific to cards transaction only. Details about the card authorization
        processing.
      properties:
        authorization_code:
          type: string
          description: >-
            Authorization approval code from the scheme. 6 alphanumeric
            characters.
        cvn_verification_result:
          type: string
          enum:
            - M
            - 'N'
          description: Whether CVN input matches with the issuer's data.
        address_verification_result:
          type: string
          enum:
            - M
            - 'N'
          description: Whether the end user's address input matches with the issuer's data.
        retrieval_reference_number:
          type: string
          description: >-
            Receipt reference number communicated to the end user by their card
            issuer for this specific payment. This a commonly used reference
            number for the end users to raise tickets.
        network_response_code:
          type: string
          description: >-
            The response code returned by the scheme (Visa, Mastercard, JCB,
            China Unionpay or Amex).
        network_response_code_descriptor:
          type: string
          description: Description of the response code.
        network_transaction_id:
          type: string
          description: >-
            Transaction ID received from the card scheme. Only available for
            merchants on switcher model.
        acquirer_merchant_id:
          type: string
          description: >-
            Acquirer's record of the MID that was used to process this
            transaction. Only available for merchants on switcher model.
        reconciliation_id:
          type: string
          description: >-
            Acquirer's transaction record of the payment on their settlement
            statement. Only available for merchants on switcher model.
    Payments_API_AuthenticationData:
      type: object
      description: >
        Specific to cards transaction only. Details about the card
        authentication.
      properties:
        flow:
          type: string
          enum:
            - FULL_AUTH
            - FRICTIONLESS
          description: Indicates the flow that was used for the 3DS authentication.
        a_res:
          type: object
          description: |
            Details about the card authentication response from the 3DS server.
          properties:
            eci:
              type: string
              description: >-
                Payment system-specific value provided by the ACS or DS to
                indicate the results of the attempt to authenticate the
                Cardholder.
            message_version:
              type: string
              description: The 3DS protocol version which has been used to perform 3DS.
            authentication_value:
              type: string
              description: >-
                The result value from the 3DS transaction received from the ACS.
                This value is no longer present on responses after 45 days have
                passed after the authentication. Note that Mastercard and Visa
                use a different underlying format.
            ds_trans_id:
              type: string
              description: >-
                Universally unique transaction identifier assigned by the DS to
                identify a single transaction.
    Payments_API_PaymentDetails:
      type: object
      description: >
        Payment information provided by the payment method provider. Fields
        returned are dependent on what is made available by the provider.

        <iframe
        src="https://doc-widget.xendit.co/channel-details/payment?iframe_id=channel-payment-iframe"
        frameborder="0" allowfullscreen="" allow="accelerometer; autoplay;
        clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        title="" style="border:1px solid
        #ccc;width:100%;display:flex;margin-right:auto;max-height:800px;"
        width="100%" loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"></iframe>
      properties:
        authorization_data:
          $ref: '#/components/schemas/Payments_API_AuthorizationData'
        authentication_data:
          $ref: '#/components/schemas/Payments_API_AuthenticationData'
        issuer_name:
          type: string
          description: |
            Name of the payment method provider used by the end user.
        payer_account_number:
          type: string
          description: >
            Account number of the end user making the payment from the payment
            method provider's records.
        payer_name:
          type: string
          description: >
            Name of the end user making the payment from the payment method
            provider's records.
        receipt_id:
          type: string
          description: >
            Receipt reference number communicated to the end user by their
            payment method provider for this specific payment. This a commonly
            used reference number for the end users to raise tickets.
        remark:
          type: string
          description: >
            Remarks about this specific payment from the payment method
            provider's records.
        network:
          type: string
          description: |
            Payment network which the payment was processed over.
        fund_source:
          type: string
          description: >
            Information about what was used by the end user to complete the
            payment. e.g. balance, installment, credit.
