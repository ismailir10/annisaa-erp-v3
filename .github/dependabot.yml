version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    target-branch: staging
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    ignore:
      # TS majors (6/7 native compiler) break Build + Lint until Next toolchain
      # supports them — see closed PR #389. Minors/patches still flow.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    target-branch: staging
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
