    Xendit_Subscriptions_API_RecurringPlan:
      type: object
      required:
        - reference_id
        - customer_id
        - currency
        - amount
        - payment_tokens
        - schedule
      properties:
        reference_id:
          type: string
          description: Merchant-provided identifier for the recurring plan.
          minLength: 1
          example: my-plan-01
        customer_id:
          type: string
          description: Xendit-generated customer ID.
        currency:
          type: string
          description: ISO 4217 currency code (e.g., IDR, PHP).
          example: IDR
        amount:
          type: number
          description: Amount to be charged in each recurring cycle.
          minimum: 0
        schedule:
          $ref: >-
            #/components/schemas/Xendit_Subscriptions_API_RecurringScheduleCreate
        payment_tokens:
          type: array
          minItems: 0
          maxItems: 5
          items:
            type: object
            required:
              - payment_token_id
              - rank
            properties:
              payment_token_id:
                type: string
                description: ID for payment token.
                example: pt-f8429206-f3ea-49f0-abb4-eaa89064056e
              rank:
                type: integer
                description: Order in which payment tokens will be attempted (1 to 5).
                minimum: 1
                maximum: 5
        immediate_payment:
          type: boolean
          default: false
          description: >-
            Payment taken upon recurring plan creation. Failing the payment will
            inactivate the plan.
        failed_cycle_action:
          type: string
          enum:
            - RESUME
            - STOP
          description: >-
            Determines if the plan should be terminated when a cycle fails.
            RESUME continues, STOP inactivates the plan.
          default: RESUME
        notification_channels:
          type: array
          items:
            type: string
            enum:
              - WHATSAPP
              - EMAIL
          description: Channels to notify end user.
        locale:
          type: string
          description: >-
            ISO 639-1 two-letter codes for language of notifications to be sent
            to end user
          default: en
        payment_link_for_failed_attempt:
          type: boolean
          description: Whether a payment link is generated for failed cycle attempts.
          default: false
        metadata:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: >-
            Additional JSON properties. Max 20 keys, with key names up to 40
            characters and values up to 80 characters.
          example:
            customKey: customValue
        description:
          type: string
          description: Custom description of the recurring plan.
          example: My newspaper subscription 01
          nullable: true
          maxLength: 1000
        items:
          type: array
          nullable: true
          description: Details of items included in the recurring plan.
          items:
            $ref: '#/components/schemas/Xendit_Subscriptions_API_BasketItem'
    Xendit_Subscriptions_API_RecurringPlanResponse:
      allOf:
        - $ref: '#/components/schemas/Xendit_Subscriptions_API_RecurringPlan'
        - type: object
          properties:
            id:
              type: string
              description: Xendit-generated recurring plan ID.
              example: repl_4e66b458-00b7-4ddd-9859-cce153dda097
            status:
              type: string
              enum:
                - ACTIVE
                - INACTIVE
                - PENDING
                - REQUIRES_ACTION
              description: Status of the recurring plan.
            failure_code:
              type: string
              nullable: true
              description: Failure code for failed plan creation
              example: UNPROCESSABLE_ENTITY_ERROR
            country:
              type: string
              nullable: true
              description: Country code for the plan
              example: ID
            recurring_cycle_count:
              type: integer
              description: Number of cycles generated for this plan.
            schedule:
              $ref: '#/components/schemas/Xendit_Subscriptions_API_RecurringSchedule'
            payment_tokens:
              type: array
              minItems: 0
              maxItems: 5
              items:
                type: object
                required:
                  - payment_token_id
                  - rank
                properties:
                  payment_token_id:
                    type: string
                    example: pt-f8429206-f3ea-49f0-abb4-eaa89064056e
                  rank:
                    type: integer
                    minimum: 1
                    maximum: 5
            actions:
              type: array
              description: >-
                Array of objects containing URLs for end users to complete the
                recurring plan.
              items:
                type: object
                required:
                  - action
                properties:
                  action:
                    type: string
                    description: >-
                      Describes the purpose of the action. `AUTH` triggers
                      payment account linking.
                  url_type:
                    type: string
                    enum:
                      - WEB
                    description: Type of URL, optimized for desktop or web interface.
                  url:
                    type: string
                    format: uri
                    description: Generated URL to perform the action.
                  method:
                    type: string
                    enum:
                      - GET
                      - POST
                    description: HTTP method for calling the URL.
            created:
              type: string
              format: date-time
              description: ISO 8601 date time format
              example: '2017-07-21T17:32:28Z'
            updated:
              type: string
              format: date-time
              description: ISO 8601 date time format
              example: '2017-07-21T17:32:28Z'
    Xendit_Subscriptions_API_RecurringPlanUpdate:
      type: object
      properties:
        amount:
          type: number
          description: Amount to be charged in each recurring cycle.
          minimum: 0
        locale:
          type: string
          description: >-
