  /your_payment_webhook_url:
    post:
      operationId: PaymentWebhook
      summary: Payment webhook notification
      description: >
        Webhook notification that will be sent to your defined webhook url for
        updates to payment status.
      parameters:
        - $ref: '#/components/parameters/Payments_API_XCallbackToken'
      tags:
        - Payment Request
      requestBody:
        description: Payment capture status callback
        content:
          application/json:
            schema:
              type: object
              description: 'Payment capture status callback for payment '
              properties:
                event:
                  type: string
                  enum:
                    - payment.capture
                    - payment.authorization
                    - payment.failure
                  description: |
                    Webhook event names for payment capture status updates.
                business_id:
                  $ref: '#/components/schemas/Payments_API_BusinessId'
                created:
                  type: string
                  format: date-time
                  description: >
                    Timestamp of webhook delivery attempt in ISO 8601 date-time
                    format.
                  example: '2021-12-31T23:59:59Z'
                data:
                  $ref: '#/components/schemas/Payments_API_PaymentSchema'
            example:
              paymentCapture:
                value:
                  event: payment.capture
                  business_id: 6094fa76c2fd53701b8e079c
                  created: '2021-12-02T14:52:21.566Z'
                  data:
                    payment_id: py-1fdaf346-dd2e-4b6c-b938-124c7167a822
                    business_id: 6094fa76c2fd53701b8e079c
                    status: SUCCEEDED
