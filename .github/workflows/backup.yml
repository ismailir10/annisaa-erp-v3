name: Nightly Backup

on:
  schedule:
    # 0 17 * * * UTC = 00:00 WIB (Asia/Jakarta)
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # `production` environment is gated by required reviewers in repo
    # Settings → Environments. Even workflow_dispatch must be approved
    # before the job's secrets unlock — blocks unauthorized exfiltration
    # via a tampered branch.
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanity-check required secrets
        env:
          PROD_DB_URL: ${{ secrets.PROD_DB_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          BACKUP_GPG_RECIPIENT: ${{ secrets.BACKUP_GPG_RECIPIENT }}
          BACKUP_GPG_FINGERPRINT: ${{ secrets.BACKUP_GPG_FINGERPRINT }}
        run: |
          set -euo pipefail
          for v in PROD_DB_URL R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY R2_ENDPOINT BACKUP_GPG_RECIPIENT BACKUP_GPG_FINGERPRINT; do
            if [ -z "${!v:-}" ]; then
              echo "::error::Required secret $v is empty"
              exit 1
            fi
          done

      - name: Install Postgres 17 client
        run: |
          set -euo pipefail
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17

      - name: Verify GPG public key fingerprint + import
        env:
          BACKUP_GPG_FINGERPRINT: ${{ secrets.BACKUP_GPG_FINGERPRINT }}
        run: |
          set -euo pipefail
          # Tamper detection: refuse to encrypt against a key whose
          # fingerprint doesn't match the secret. Blocks the attack
          # where someone swaps ops/backup-public.asc to a key whose
          # private half they control.
          ACTUAL=$(gpg --with-colons --import-options show-only --import ops/backup-public.asc \
            | awk -F: '/^fpr:/{print $10; exit}')
          EXPECTED=$(echo "$BACKUP_GPG_FINGERPRINT" | tr -d ' ')
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::GPG fingerprint mismatch — expected $EXPECTED, got $ACTUAL"
            exit 1
          fi
          gpg --import ops/backup-public.asc

      - name: Dump production database
        env:
          PROD_DB_URL: ${{ secrets.PROD_DB_URL }}
        run: |
          set -euo pipefail
          pg_dump "$PROD_DB_URL" \
            --format=custom \
            --no-owner \
            --no-acl \
            --file=dump.pgc

      - name: Encrypt dump
        env:
          BACKUP_GPG_RECIPIENT: ${{ secrets.BACKUP_GPG_RECIPIENT }}
        run: |
          set -euo pipefail
          gpg --batch --yes --trust-model always \
            --encrypt --recipient "$BACKUP_GPG_RECIPIENT" \
            --output dump.pgc.gpg dump.pgc
          rm -f dump.pgc

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
          AWS_DEFAULT_REGION: auto
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y/%m/%d)
          aws s3 cp dump.pgc.gpg "s3://talib-backups/$DATE/dump.pgc.gpg"
          aws s3 ls "s3://talib-backups/$DATE/"
