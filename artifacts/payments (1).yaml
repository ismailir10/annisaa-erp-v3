          example:
            customKey: customValue
        payment_tokens:
          type: array
          description: Not allowed to set empty array
          minItems: 1
          maxItems: 5
          items:
            type: object
            required:
              - payment_token_id
              - rank
            properties:
              payment_token_id:
                type: string
                description: ID for payment token.
                example: pt-f8429206-f3ea-49f0-abb4-eaa89064056e
              rank:
                type: integer
                description: Order in which payment tokens will be attempted (1 to 5).
                minimum: 1
                maximum: 5
        schedule:
          $ref: >-
            #/components/schemas/Xendit_Subscriptions_API_RecurringScheduleUpdate
    Xendit_Subscriptions_API_RecurringScheduleCreate:
      type: object
      required:
        - interval
        - interval_count
        - anchor_date
      properties:
        interval:
          type: string
          enum:
            - DAY
            - WEEK
            - MONTH
            - YEAR
          description: Frequency of the recurring cycles.
        interval_count:
          type: integer
          description: Number of intervals between consecutive cycles.
          minimum: 1
          maximum: 365
        total_recurrence:
          type: integer
          nullable: true
          description: Total number of cycles (optional; runs indefinitely if null).
          minimum: 1
          maximum: 32000
        anchor_date:
          type: string
          format: date-time
          description: >-
            Start date for the recurring schedule (ISO 8601 format), max allowed
            day of the month is 28. Supports time offset and UTC zero.
          example: '2020-11-20T23:23:52+07:00'
        retry_interval:
          type: string
          nullable: true
          description: Interval between retry attempts for failed payments.
          enum:
            - DAY
            - null
        retry_interval_count:
          type: integer
          nullable: true
          description: Number of retry intervals between consecutive retries.
          minimum: 1
          maximum: 365
        total_retry:
          type: integer
          nullable: true
          description: Maximum number of retries for failed cycles.
          minimum: 1
          maximum: 10
        failed_attempt_notifications:
          type: array
          items:
            type: integer
            minimum: 1
            maximum: 10
          description: Notifications triggered at specific retry attempts.
          example:
            - 1
            - 3
            - 5
    Xendit_Subscriptions_API_RecurringScheduleUpdate:
